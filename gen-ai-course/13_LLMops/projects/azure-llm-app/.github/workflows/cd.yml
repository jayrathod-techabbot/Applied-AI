name: CD — Build & Deploy to Azure

on:
  push:
    branches:
      - main          # triggers staging deploy
      - release/*     # triggers production deploy
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [dev, staging, prod]

env:
  APP_NAME: llmapp
  LOCATION: eastus

jobs:
  determine-env:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.environment }}
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      acr-server: ${{ steps.acr-login.outputs.acr-server }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR server name
        id: acr-login
        run: |
          ACR_SERVER=$(az acr show \
            --resource-group "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-rg" \
            --name "${{ env.APP_NAME }}${{ needs.determine-env.outputs.environment }}acr" \
            --query loginServer -o tsv)
          echo "acr-server=$ACR_SERVER" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr-login.outputs.acr-server }}/llm-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        run: az acr login --name "${{ env.APP_NAME }}${{ needs.determine-env.outputs.environment }}acr"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [determine-env, build-and-push]
    environment: ${{ needs.determine-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-rg
          template: infrastructure/bicep/main.bicep
          parameters: >
            environment=${{ needs.determine-env.outputs.environment }}
            appName=${{ env.APP_NAME }}
            imageTag=${{ needs.build-and-push.outputs.image-tag }}

      - name: Wait for Container App to be healthy
        run: |
          APP_URL=$(az containerapp show \
            --resource-group "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-rg" \
            --name "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-app" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Checking health at https://$APP_URL/health"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/12 — status: $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1

      - name: Run smoke tests
        run: |
          APP_URL=$(az containerapp show \
            --resource-group "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-rg" \
            --name "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-app" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          pip install httpx
          python -c "
          import httpx
          r = httpx.get('https://$APP_URL/health')
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          print('Smoke test passed:', r.json())
          "

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment to ${{ needs.determine-env.outputs.environment }} succeeded!"
          echo "Image: ${{ needs.build-and-push.outputs.image-tag }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — triggering rollback to previous revision"
          az containerapp revision list \
            --resource-group "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-rg" \
            --name "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-app" \
            --query "[?properties.active==\`false\`] | [0].name" -o tsv \
          | xargs -I {} az containerapp revision activate \
              --resource-group "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-rg" \
              --name "${{ env.APP_NAME }}-${{ needs.determine-env.outputs.environment }}-app" \
              --revision {}
