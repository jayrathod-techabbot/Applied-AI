name: Build & Deploy to AWS

on:
  push:
    branches: [main, "release/*"]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, staging, prod]
        default: dev

env:
  AWS_REGION: us-east-1
  APP_NAME: llm-app

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check app/ tests/
      - run: pytest tests/ --cov=app --cov-fail-under=80 -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit safety
      - run: bandit -r app/ -ll
      - run: safety check -r requirements.txt

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test, security]
    environment: ${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/heads/release/') && 'prod' || 'dev') }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/heads/release/') && 'prod' || 'dev') }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.APP_NAME }}:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE_URI=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation.yml \
            --stack-name "${APP_NAME}-${ENVIRONMENT}" \
            --parameter-overrides \
                Environment="$ENVIRONMENT" \
                ImageTag="${{ github.sha }}" \
                EcrRepo="${{ steps.ecr.outputs.registry }}/${APP_NAME}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Health check
        run: |
          ALB_URL=$(aws cloudformation describe-stacks \
            --stack-name "${APP_NAME}-${ENVIRONMENT}" \
            --query "Stacks[0].Outputs[?OutputKey=='ALBURL'].OutputValue" \
            --output text)
          echo "Checking $ALB_URL/health"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ALB_URL/health" || echo "000")
            [ "$STATUS" = "200" ] && echo "Healthy!" && exit 0
            echo "Attempt $i — $STATUS — retrying..."
            sleep 15
          done
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          aws cloudformation cancel-update-stack \
            --stack-name "${APP_NAME}-${ENVIRONMENT}" || true
          echo "Rollback triggered"
