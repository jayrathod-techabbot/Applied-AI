version: "3.9"

# WHY named volume for output/:
#   Both the 'app' (FastAPI) and 'streamlit' services need access to the same
#   chart PNG files. A named Docker volume mounts the same directory into both
#   containers, so charts generated by the API are immediately readable by the
#   Streamlit UI without an HTTP file-serving layer.

volumes:
  output_data:
    driver: local

services:

  # ─── FastAPI Analysis API ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: data_pipeline_api
    ports:
      - "8000:8000"
    volumes:
      - output_data:/app/output
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OUTPUT_DIR=/app/output
      - MAX_REFLECTION_ITERATIONS=${MAX_REFLECTION_ITERATIONS:-2}
      - REFLECTION_QUALITY_THRESHOLD=${REFLECTION_QUALITY_THRESHOLD:-7.0}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Streamlit UI ──────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: data_pipeline_ui
    # Override the default CMD to run Streamlit instead of uvicorn
    command: ["streamlit", "run", "ui/app.py",
              "--server.port=8501",
              "--server.address=0.0.0.0",
              "--server.headless=true",
              "--browser.gatherUsageStats=false"]
    ports:
      - "8501:8501"
    volumes:
      - output_data:/app/output
    environment:
      - API_BASE_URL=http://app:8000
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OUTPUT_DIR=/app/output
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
